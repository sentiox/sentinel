name: Build packages

on:
  push:
    tags:
      - "v*"

# 🔴 ВОТ ЭТОГО У ТЕБЯ НЕ ХВАТАЛО
permissions:
  contents: write

jobs:
  build:
    name: Build sentinel and luci-app-sentinel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "dev_$(date +%d%mY)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: sentinel:ci
          push: false
          build-args: |
            sentinel_VERSION=${{ steps.version.outputs.version }}

      - name: Create Docker container
        run: docker create --name sentinel sentinel:ci

      - name: Copy IPK files from container
        run: |
          mkdir -p bin
          docker cp sentinel:/builder/bin/packages/x86_64/utilities/. ./bin/
          docker cp sentinel:/builder/bin/packages/x86_64/luci/. ./bin/

      - name: Filter IPK files
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          mkdir -p filtered-bin
          cp bin/luci-i18n-sentinel-ru_*.ipk "filtered-bin/luci-i18n-sentinel-ru_${VERSION}.ipk"
          cp bin/sentinel_*.ipk filtered-bin/
          cp bin/luci-app-sentinel_*.ipk filtered-bin/

      - name: Remove Docker container
        run: docker rm sentinel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: filtered-bin/*.ipk
